<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสูตรและการใช้งาน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-12 overflow-x-hidden">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-4xl mx-auto px-4 py-4 sm:py-6">
      <div class="flex items-center justify-between">
        <a href="index.html" class="inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-medium transition-colors text-sm sm:text-base">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>ย้อนกลับหน้าหลัก</span>
        </a>
        <div class="text-xs sm:text-sm text-slate-500 font-medium">รายละเอียด & ตัวอย่างการใช้งาน</div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 mt-6 sm:mt-8">
    <div id="detailContainer" class="space-y-6 sm:space-y-8 animate-fade-in">
      <!-- Loading State -->
      <div class="text-center py-20 bg-white rounded-2xl border border-slate-100">
        <div class="inline-block animate-spin rounded-full h-8 sm:h-10 w-8 sm:w-10 border-t-2 border-b-2 border-indigo-600 mb-4"></div>
        <p class="text-slate-500 font-medium">กำลังโหลดข้อมูลสูตร...</p>
      </div>
    </div>
  </main>

  <!-- Script Files -->
  <script src="script.js"></script>
  <script src="detail.js"></script>
</body>
</html>
