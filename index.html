<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คลังสูตรคณิตศาสตร์ ครบจบในที่เดียว</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-12 overflow-x-hidden">

  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-4 sm:py-6 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 sm:gap-4">
        <div class="flex items-center gap-3">
          <div class="bg-indigo-600 p-2 sm:p-2.5 rounded-lg text-white shrink-0 shadow-md shadow-indigo-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 sm:w-7 sm:h-7"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
          </div>
          <div>
            <h1 class="text-xl sm:text-2xl font-bold text-slate-900 leading-tight">คลังสูตรคณิตศาสตร์</h1>
            <p class="text-xs sm:text-sm text-slate-500 mt-0.5">รวมสูตรทุกหัวข้อ และสูตรลัดสอบ กฟผ. / ก.พ.</p>
          </div>
        </div>

        <div class="relative w-full md:w-80 lg:w-96 shrink-0">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </div>
          <input
            type="text"
            id="searchInput"
            placeholder="ค้นหาสูตร เช่น พื้นที่, ความเร็ว, ไฟฟ้า..."
            class="block w-full pl-10 pr-3 py-2.5 sm:py-2 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm sm:text-base transition-shadow"
          />
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 sm:mt-8">
    <div id="categoryContainer" class="flex overflow-x-auto pb-2 sm:pb-4 mb-4 sm:mb-6 -mx-4 px-4 sm:mx-0 sm:px-0 hide-scrollbar gap-2 sm:gap-3 touch-pan-x">
      </div>

    <div id="formulasContainer" class="space-y-8 sm:space-y-10">
      </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
